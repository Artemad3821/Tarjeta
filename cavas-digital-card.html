<style>

  .card-back { background: #2a2420; display: flex; flex-direction: row; height: 100%; animation: fadeUp 0.8s 0.1s ease both; }
  .back-left { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 22px 20px 20px; }
  .contact-block { display: flex; flex-direction: column; gap: 6px; }
  .contact-item { display: flex; flex-direction: column; gap: 2px; }
  .contact-label { font-size: 6.5px; letter-spacing: 0.15em; text-transform: uppercase; color: #7C5A46; font-weight: 400; }
  .contact-value { font-size: 8px; letter-spacing: 0.02em; color: #EFE9E1; font-weight: 300; text-decoration: none; word-break: break-word; }
  a.contact-value:active { color: #C4825A; }
  .back-footer { font-family: "Cormorant Garamond", serif; font-size: 9px; font-style: italic; letter-spacing: 0.12em; color: #5a5048; }
